name: bayhop
description: "BayHop, a generative Bay Area transit and exploration app."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  genui: ^0.9.2
  geolocator: ^14.0.3
  google_fonts: ^6.2.1
  google_maps_flutter: ^2.17.1
  googleai_dart: ^8.0.0
  http: ^1.6.0
  json_schema_builder: ^0.1.5
  openai_dart: ^1.4.0
  pointer_interceptor: ^0.10.1+2
  shared_preferences: ^2.5.5
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.1
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true
